<h2>Login</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <div>
    <label>Correo</label><br />
    <input formControlName="correo" />
  </div>

  <div *ngIf="error" style="color:red; margin-top:8px;">
    {{ error }}
  </div>

  <button type="submit" style="margin-top:12px;">
    Entrar
  </button>
</form>
